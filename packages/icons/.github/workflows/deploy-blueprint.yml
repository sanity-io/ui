name: Deploy Sanity Blueprint

on:
  push:
    branches: [main]
    paths:
      - 'sanity.blueprint.ts'
      - 'functions/**'
  workflow_dispatch:

concurrency:
  group: deploy-blueprint
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/setup@v1
        with:
          cache: true
      - run: pnpm blueprint:deploy
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_DEPLOY_TOKEN }}
          # Scope + Stack normally live in the gitignored .sanity/blueprint.config.json,
          # so CI must supply them. projectId is non-secret; the Stack ID (ST-…) comes
          # from `sanity blueprints init` and is set as a repo variable.
          SANITY_PROJECT_ID: ppsg7ml5
          SANITY_BLUEPRINT_STACK_ID: ${{ vars.SANITY_BLUEPRINT_STACK_ID }}
