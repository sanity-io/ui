allowBuilds:
  core-js: false
  esbuild: false
  fsevents: false
  lefthook: true
  unrs-resolver: false

# Allow the freshly published vite 8 release through pnpm's minimum release age
# supply-chain policy (a no-op when the policy is not enabled).
minimumReleaseAgeExclude:
  - '@sanity/*'
  - '@types/node'
  - '@oxlint/*'
  - knip
  - 'oxlint'
  - 'oxlint-tsgolint'
  - sanity
  - sanity-plugin-media
  - vite
  - '@architect/hydrate@6.0.2'
  # tsdown 0.22.7 and the yuku parser/codegen family it pulls in via
  # rolldown-plugin-dts are freshly published alongside each other.
  - '@yuku-codegen/*'
  - '@yuku-parser/*'
  - rolldown-plugin-dts
  - tsdown
  - yuku-codegen
  - yuku-parser

publicHoistPattern:
  - 'react-refractor'
  - 'refractor'
