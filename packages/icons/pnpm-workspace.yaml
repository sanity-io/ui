allowBuilds:
  core-js: false
  esbuild: false
  fsevents: false
  lefthook: true
  unrs-resolver: false

# Allow the freshly published vite 8 release through pnpm's minimum release age
# supply-chain policy (a no-op when the policy is not enabled).
minimumReleaseAgeExclude:
  - '@sanity/*'
  - '@types/node'
  - '@oxlint/*'
  - 'oxlint'
  - 'oxlint-tsgolint'
  - sanity
  - vite
  - '@architect/hydrate@6.0.2'

publicHoistPattern:
  - 'react-refractor'
  - 'refractor'
