allowBuilds:
  core-js: false
  esbuild: false
  fsevents: false
  lefthook: true
  unrs-resolver: false

# Allow the freshly published vite 8 release through pnpm's minimum release age
# supply-chain policy (a no-op when the policy is not enabled).
minimumReleaseAgeExclude:
  - '@sanity/*'
  - '@oxlint/*'
  - 'oxlint'
  - 'oxlint-tsgolint'
  - vite@8.1.2

publicHoistPattern:
  - 'react-refractor'
  - 'refractor'
