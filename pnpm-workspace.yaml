packages:
  - 'apps/*'
  - 'apps/blueprints/*'
  - 'packages/*'

linkWorkspacePackages: deep
strictPeerDependencies: false

# Version ranges for dependencies used by more than one workspace package.
# Referenced from package.json files via the `catalog:` protocol.
# apps/docs deliberately diverges from the workspace-wide typescript (v5 vs
# v6), @types/node (v24 vs v22) and vitest (v3 vs v4, see the
# packageExtensions note) versions, so those keep explicit ranges there.
catalog:
  '@sanity/blueprints': ^0.21.0
  '@sanity/client': ^7.23.2
  '@sanity/color': ^3.0.6
  '@sanity/functions': ^1.4.0
  '@sanity/icons': ^3.8.0
  '@sanity/tsdown-config': ^0.19.6
  '@types/node': ^24.13.3
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  '@types/react-is': ^19.2.0
  babel-plugin-react-compiler: ^1.0.0
  react: ^19.2.7
  react-dom: ^19.2.7
  react-is: ^19.2.7
  react-refractor: ^4.0.0
  refractor: ^5.0.0
  rimraf: ^5.0.5
  sanity: ^6.4.0
  styled-components: ^6.4.3
  tsdown: ^0.22.12
  typescript: 6.0.3
  unrun: ^0.3.1
  vite: ^8.1.4
  vitest: ^4.1.10

allowBuilds:
  core-js: false
  esbuild: false
  fsevents: false
  sharp: true
  unrs-resolver: true

# Sanity-owned build tooling releases frequently; don't gate it on the
# default minimum release age (1 day). Same for next's `preview` dist-tag
# (apps/docs pins an exact preview version, so the exclusion only lifts the
# age gate for versions we deliberately pick). tsdown and its lightningcss /
# verkit transitive deps are included for the same reason when we deliberately
# bump the catalog.
minimumReleaseAgeExclude:
  - '@next/*'
  - '@sanity/code-input@7.2.7'
  - '@sanity/tsdown-config'
  - '@sanity/vanilla-extract-*'
  - lightningcss
  - lightningcss-*
  - next
  - tsdown
  - verkit

# @testing-library/jest-dom/vitest imports `vitest` without declaring it, so it
# falls back to pnpm's hidden hoist — which can resolve to another workspace
# package's vitest version (e.g. apps/docs uses vitest 3, packages/ui vitest 4),
# registering the matchers on the wrong `expect` instance. Declare the peer so
# each consumer gets its own vitest linked.
packageExtensions:
  '@testing-library/jest-dom':
    peerDependencies:
      vitest: '*'
    peerDependenciesMeta:
      vitest:
        optional: true

overrides:
  '@types/react': 'catalog:'
  '@types/react-dom': 'catalog:'
  '@types/react-is': 'catalog:'
  react: 'catalog:'
  react-dom: 'catalog:'
  react-is: 'catalog:'
