packages:
  - 'apps/*'
  - 'packages/*'

linkWorkspacePackages: deep
strictPeerDependencies: false

allowBuilds:
  core-js: false
  esbuild: false
  fsevents: false
  unrs-resolver: true

# Sanity-owned build tooling releases frequently; don't gate it on the
# default minimum release age (1 day)
minimumReleaseAgeExclude:
  - '@sanity/tsdown-config'

# Keep in sync with the pnpm.overrides field in package.json, which exists for
# tooling that still runs older pnpm versions (e.g. Vercel deploys with pnpm 9)
overrides:
  '@types/react': ^19.2.2
  '@types/react-dom': ^19.2.2
  '@types/react-is': ^19.2.0
  react: ^19.2.0
  react-dom: ^19.2.0
  react-is: ^19.2.0
